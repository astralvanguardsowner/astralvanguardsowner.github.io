  <style>
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to bottom, #fff7e6, #f0e6ff);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      color: #333;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #4a148c;
      text-shadow: 1px 1px 3px #ccc;
    }

    /* Updates / Coming Soon Banner */
    #updates {
      background-color: #f9f9f9;
      border-radius: 12px;
      padding: 15px 20px;
      text-align: center;
      max-width: 600px;
      margin-bottom: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    #updates h2 {
      margin: 0 0 10px 0;
      font-size: 22px;
      color: #333;
    }

    #updates p {
      margin: 5px 0;
      font-size: 18px;
      line-height: 1.5;
    }

    #dhikr-display {
      font-size: 28px;
      text-align: center;
      padding: 30px 20px;
      min-height: 100px;
      max-width: 600px;
      border-radius: 15px;
      background-color: #fff;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      line-height: 1.6;
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }

    button {
      font-size: 20px;
      padding: 15px 30px;
      background-color: #6a1b9a;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
      transition: background-color 0.3s ease, transform 0.2s ease;
      margin-bottom: 40px;
    }

    button:hover {
      background-color: #4a148c;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
    }

    #support {
      text-align: center;
      margin-bottom: 20px;
    }

    #support h2 {
      font-size: 24px;
      margin-bottom: 15px;
      color: #333;
    }

    .support-links a {
      display: inline-block;
      margin: 5px 10px;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 8px;
      background-color: #4caf50;
      color: white;
      font-weight: bold;
      transition: background-color 0.3s;
    }

    .support-links a:hover {
      background-color: #45a049;
    }

    footer {
      margin-top: 30px;
      font-size: 14px;
      color: #555;
      text-align: center;
    }

  </style>

<body>

  <h1>Click to Dhikr</h1>

  <div id="updates">
    <h2>📢 Updates</h2>

    <p>📱 Our mobile app will be available soon. Stay tuned!</p>
  </div>

  <div id="dhikr-display">Click the button to start dhikr</div>
  <button onclick="nextDhikr()">Next Dhikr</button>

  <div id="support">
    <h2>Support / Follow Us</h2>
    <div class="support-links">
      <a href="https://www.tiktok.com/@muhammad71277" target="_blank">TikTok 1 (first account)</a>

      <a href="#" onclick="appComingSoon()">Our App</a>
    </div>

  <script>
    const dhikrs = [
      "سُبْحَانَ اللَّه","الْحَمْدُ لِلَّه","لَا إِلَهَ إِلَّا اللَّه","اللَّهُ أَكْبَر",
      "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّه","أَسْتَغْفِرُ اللَّه","سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",
      "سُبْحَانَ اللَّهِ الْعَظِيم","اللَّهُمَّ صَلِّ وَسَلِّمْ عَلَى نَبِيِّنَا مُحَمَّد",
      "لَا إِلَهَ إِلَّا أَنْتَ سُبْحَانَكَ إِنِّي كُنْتُ مِنَ الظَّالِمِينَ",
      "حَسْبُنَا اللَّهُ وَنِعْمَ الْوَكِيل","سُبْحَانَ اللَّهِ عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ",
      "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِير",
      "أَسْتَغْفِرُ اللَّهَ الَّذِي لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ وَأَتُوبُ إِلَيْه",
      "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيم",
      "أَعُوذُ بِكَلِمَاتِ اللَّهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَق","يَا حَيُّ يَا قَيُّومُ بِرَحْمَتِكَ أَسْتَغِيثُ أَصْلِحْ لِي شَأْنِي كُلَّهُ وَلَا تَكِلْنِي إِلَى نَفْسِي طَرْفَةَ عَيْن",
      "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ خَلَقْتَنِي وَأَنَا عَبْدُكَ وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْت",
      "أَعُوذُ بِاللَّهِ مِنَ الشَّيْطَانِ الرَّجِيم","بِسْمِ اللَّه","الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنَا وَسَقَانَا وَجَعَلَنَا مُسْلِمِين",
      "الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُور","بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا",
      "تَوَكَّلْتُ عَلَى اللَّه","رَضِيتُ بِاللَّهِ رَبًّا وَبِالْإِسْلَامِ دِينًا وَبِمُحَمَّدٍ نَبِيًّا",
      "سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُون",
      "اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَة","لَا إِلَهَ إِلَّا اللَّهُ الْعَظِيمُ الْحَلِيم، لَا إِلَهَ إِلَّا اللَّهُ رَبُّ الْعَرْشِ الْعَظِيم",
      "سُبُّوحٌ قُدُّوسٌ رَبُّ الْمَلَائِكَةِ وَالرُّوح","أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ",
      "اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ وَإِلَيْكَ النُّشُور",
      "اللَّهُمَّ مَا أَصْبَحَ بِي مِنْ نِعْمَةٍ أَوْ بِأَحَدٍ مِنْ خَلْقِكَ فَمِنْكَ وَحْدَكَ لَا شَرِيكَ لَكَ",
      "اللَّهُمَّ عافِني في بَدَني، اللَّهُمَّ عافِني في سَمعي، اللَّهُمَّ عافِني في بَصَري",
      "بِسْمِ اللَّهِ وَلَجْنَا، وَبِسْمِ اللَّهِ خَرَجْنَا، وَعَلَى رَبِّنَا تَوَكَّلْنَا",
      "اللَّهُمَّ إِنِّي أَعُوذُ بِكَ أَنْ أَضِلَّ أَوْ أُضَلَّ، أَوْأَزِلَّ أَوْأُزَلَّ",
      "بِسْمِ اللَّهِ، اللَّهُمَّ جَنِّبْنَا الشَّيْطَانَ، وَجَنِّبِ الشَّيْطَانَ مَا رَزَقْتَنَا",
      "اللَّهُمَّ أَعِنِّي عَلَى ذِكْرِكَ وَشُكْرِكَ وَحُسْنِ عِبَادَتِكَ",
      "اللَّهُمَّ اغْفِرْ لِي ذَنْبِي كُلَّهُ دِقَّهُ وَجِلَّهُ وَأَوَّلَهُ وَآخِرَهُ وَعَلَانِيَتَهُ وَسِرَّه",
      "اللَّهُمَّ بَارِكْ لَنَا فِيمَا رَزَقْتَنَا وَقِنَا عَذَابَ النَّار",
      "اللَّهُمَّ لَكَ الْحَمْدُ مِلْءُ السَّمَاوَاتِ وَمِلْءُ الْأَرْضِ وَمِلْءُ مَا بَيْنَهُمَا",
      "الْحَمْدُ لِلَّهِ حَمْدًا كَثِيرًا طَيِّبًا مُبَارَكًا فِيهِ"
    ];

    let currentIndex = 0;

    function nextDhikr() {
      const display = document.getElementById('dhikr-display');
      display.innerText = dhikrs[currentIndex];
      currentIndex++;
      if(currentIndex >= dhikrs.length) currentIndex = 0;
    }

    function appComingSoon() {
      alert("📱 Our mobile app will be available soon — stay tuned!");
    }
  </script>

</body>
  </html>
